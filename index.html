<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎁</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
    overflow: hidden;
}

/* 🎭 Curtains */
.curtain {
    position: fixed;
    top: 0;
    width: 50%;
    height: 100%;
    background: linear-gradient(135deg, #ff4b5c, #c31432);
    z-index: 10;
}

.left {
    left: 0;
    animation: openLeft 2s ease forwards;
}

.right {
    right: 0;
    animation: openRight 2s ease forwards;
}

@keyframes openLeft {
    to { transform: translateX(-100%); }
}

@keyframes openRight {
    to { transform: translateX(100%); }
}

/* ✨ Sparkles */
.sparkle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
    animation: float 6s linear infinite;
}

@keyframes float {
    from {
        transform: translateY(0) scale(1);
        opacity: 0.7;
    }
    to {
        transform: translateY(-100vh) scale(0.5);
        opacity: 0;
    }
}

/* Card */
.card {
    text-align: center;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: scale(0.8);
    animation: showCard 1.5s ease forwards;
    animation-delay: 2s;
}

@keyframes showCard {
    to { opacity:1; transform: scale(1); }
}

/* Button */
.surprise-btn {
    margin-top: 25px;
    padding: 15px 35px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: #ff6f91;
    color: white;
    transition: 0.3s;
}

.surprise-btn:hover {
    transform: scale(1.1);
}

/* Fade-out */
.fade-out {
    animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; transform: scale(1.2); }
}
</style>
</head>

<body>

<!-- 🎭 Curtains -->
<div class="curtain left"></div>
<div class="curtain right"></div>

<!-- 🎁 Main Card -->
<div class="card" id="card">
    <h1>🎁 A Special Surprise Awaits...</h1>
    <p>Click below if you're ready 🎉</p>

    <button class="surprise-btn" onclick="goToNext()">
        🎉 Surprise Me
    </button>
</div>

<script>
// ✨ Generate sparkles
for(let i=0;i<35;i++){
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    s.style.animationDuration = (4 + Math.random()*4) + "s";
    s.style.width = s.style.height = (5 + Math.random()*5) + "px";
    document.body.appendChild(s);
}

// 🎬 Transition
function goToNext() {
    document.getElementById("card").classList.add("fade-out");
    setTimeout(() => {
        window.location.href = "gallery.html";
    }, 1000);
}
</script>

</body>
</html>
